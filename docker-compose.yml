version: '3.9'

services:
  # ─── PHP-FPM (Symfony Backend) ─────────────────────────────────────────────
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: logistics_php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logistics_net

  # ─── Nginx (reverse proxy + static files) ──────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: logistics_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./frontend/dist:/var/www/html/frontend/dist:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
    networks:
      - logistics_net

  # ─── Frontend build (Vite dev server for development) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: logistics_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    networks:
      - logistics_net

  # ─── PostgreSQL 16 ─────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: logistics_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logistics_crm}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-logistics_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logistics_net

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: logistics_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logistics_net

  # ─── Mailpit (e-mail testing) ───────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: logistics_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    networks:
      - logistics_net

  # ─── Symfony Messenger Consumer ────────────────────────────────────────────
  messenger:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: logistics_messenger
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MAILER_DSN: ${MAILER_DSN}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - logistics_net

volumes:
  postgres_data:
  redis_data:
  backend_vendor:
  frontend_node_modules:

networks:
  logistics_net:
    driver: bridge

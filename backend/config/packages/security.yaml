security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_memory:
            memory:
                users:
                    courier:
                        password: '$2y$13$hashed_password_placeholder'
                        roles: ['ROLE_COURIER']
                    admin:
                        password: '$2y$13$hashed_password_placeholder'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
            lazy: true
            # TODO: Replace with JWT authenticator in production
            # jwt: ~

    access_control:
        - { path: ^/api/parcels, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

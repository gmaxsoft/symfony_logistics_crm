name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Use Node.js 24 to silence the Node.js 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  POSTGRES_DB: logistics_crm_test
  POSTGRES_USER: app
  POSTGRES_PASSWORD: secret
  DATABASE_URL: "postgresql://app:secret@localhost:5432/logistics_crm_test?serverVersion=16&charset=utf8"
  REDIS_URL: redis://localhost:6379
  APP_ENV: test
  APP_SECRET: test_secret_not_for_production_use
  MESSENGER_TRANSPORT_DSN: in-memory://
  MAILER_DSN: "null://null"
  CORS_ALLOW_ORIGIN: "'^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$'"

jobs:
  # ─── Backend: Lint + Tests ────────────────────────────────────────────────────
  backend:
    name: Backend (PHP 8.3)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d logistics_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, intl, zip, opcache, bcmath, mbstring, sockets
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: backend
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies (no post-scripts in CI)
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Dump autoloader
        working-directory: backend
        run: composer dump-autoload --optimize

      - name: Copy test env
        working-directory: backend
        run: cp .env.test .env.local

      - name: Create test database and run migrations
        working-directory: backend
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: test
          APP_SECRET: ${{ env.APP_SECRET }}
          MESSENGER_TRANSPORT_DSN: ${{ env.MESSENGER_TRANSPORT_DSN }}
          MAILER_DSN: ${{ env.MAILER_DSN }}

      - name: Warmup Symfony cache (dev, for PHPStan container XML)
        working-directory: backend
        run: php bin/console cache:warmup --env=dev
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: dev
          APP_SECRET: ${{ env.APP_SECRET }}
          MESSENGER_TRANSPORT_DSN: ${{ env.MESSENGER_TRANSPORT_DSN }}
          MAILER_DSN: ${{ env.MAILER_DSN }}
        continue-on-error: true

      - name: Run PHP CS Fixer (check only)
        working-directory: backend
        run: vendor/bin/php-cs-fixer check --diff --no-interaction

      - name: Run PHPStan (static analysis)
        working-directory: backend
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

      - name: Run Psalm (static analysis)
        working-directory: backend
        run: vendor/bin/psalm --no-progress --output-format=github
        continue-on-error: true

      - name: Create coverage directory
        working-directory: backend
        run: mkdir -p coverage

      - name: Run PHPUnit tests
        working-directory: backend
        run: vendor/bin/phpunit --coverage-text --log-junit=coverage/junit.xml
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: test
          APP_SECRET: ${{ env.APP_SECRET }}
          MESSENGER_TRANSPORT_DSN: ${{ env.MESSENGER_TRANSPORT_DSN }}
          MAILER_DSN: ${{ env.MAILER_DSN }}

      - name: Upload PHPUnit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage
          path: backend/coverage/
          if-no-files-found: warn

  # ─── Frontend: Lint + Type Check + Build ─────────────────────────────────────
  frontend:
    name: Frontend (Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies (npm workspaces)
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint:check

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker: Build smoke test ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for Docker
        run: cp .env.example .env

      - name: Build PHP image (dev stage)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: logistics-php:ci

      - name: Build Frontend image (dev stage)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: logistics-frontend:ci

      - name: Start infra services and verify
        run: |
          docker compose up -d database redis mailpit
          sleep 15
          docker compose ps
          docker compose exec database pg_isready -U app

  # ─── E2E: Cypress Tests ───────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d logistics_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, intl, zip, opcache, bcmath, mbstring

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts && composer dump-autoload --optimize

      - name: Setup test database with fixtures
        working-directory: backend
        run: |
          cp .env.test .env.local
          # .env.test uses Docker hostname "database"; CI Postgres service is on localhost
          sed -i 's/@database:/@127.0.0.1:/g' .env.local
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
          php bin/console doctrine:fixtures:load --env=test --no-interaction
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: test
          APP_SECRET: ${{ env.APP_SECRET }}
          MESSENGER_TRANSPORT_DSN: ${{ env.MESSENGER_TRANSPORT_DSN }}
          MAILER_DSN: ${{ env.MAILER_DSN }}

      - name: Start Symfony dev server
        working-directory: backend
        run: php -S 0.0.0.0:8080 -t public &
        env:
          # Must match .env.local after sed (Postgres service on host)
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: test
          APP_SECRET: ${{ env.APP_SECRET }}
          MESSENGER_TRANSPORT_DSN: ${{ env.MESSENGER_TRANSPORT_DSN }}
          MAILER_DSN: ${{ env.MAILER_DSN }}

      - name: Wait for backend to be ready
        run: |
          for i in {1..20}; do
            curl -sf http://localhost:8080/api/parcels && break
            sleep 2
          done

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all npm dependencies
        run: npm ci

      - name: Start Vue dev server
        working-directory: frontend
        run: npm run dev &
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: Run Cypress E2E tests
        run: npx cypress run --browser chrome --headless
        env:
          CYPRESS_BASE_URL: http://localhost:5173
          CYPRESS_apiUrl: http://localhost:8080/api

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  POSTGRES_DB: logistics_crm_test
  POSTGRES_USER: app
  POSTGRES_PASSWORD: secret
  DATABASE_URL: "postgresql://app:secret@localhost:5432/logistics_crm_test?serverVersion=16&charset=utf8"
  REDIS_URL: redis://localhost:6379
  APP_ENV: test
  APP_SECRET: test_secret_not_for_production_use
  MESSENGER_TRANSPORT_DSN: in-memory://
  MAILER_DSN: null://null

jobs:
  # ─── Backend: PHP Static Analysis + Tests ────────────────────────────────────
  backend:
    name: Backend (PHP 8.3)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d logistics_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, intl, zip, opcache, bcmath, mbstring
          coverage: xdebug
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        working-directory: backend
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy test env
        working-directory: backend
        run: cp .env.test .env.local

      - name: Create test database
        working-directory: backend
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPStan (static analysis)
        working-directory: backend
        run: |
          php bin/console cache:warmup --env=dev || true
          vendor/bin/phpstan analyse --memory-limit=256M --no-progress

      - name: Run PHPUnit tests
        working-directory: backend
        run: vendor/bin/phpunit --coverage-text --log-junit=coverage/junit.xml
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload PHPUnit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage
          path: backend/coverage/

  # ─── Frontend: Lint + Type Check + Build ────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker: Build and smoke test ────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for Docker
        run: cp .env.example .env

      - name: Build PHP image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: logistics-php:ci

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: dev
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: logistics-frontend:ci

      - name: Docker Compose smoke test
        run: |
          docker compose up -d database redis
          sleep 10
          docker compose ps

  # ─── E2E: Cypress Tests ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d logistics_crm_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, intl, zip, opcache, bcmath, mbstring

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Setup test database
        working-directory: backend
        run: |
          cp .env.test .env.local
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
          php bin/console doctrine:fixtures:load --env=test --no-interaction
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start Symfony dev server
        working-directory: backend
        run: |
          php -S 0.0.0.0:8080 -t public &
          sleep 3
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          APP_ENV: test
          APP_SECRET: ${{ env.APP_SECRET }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies (Cypress)
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start Vue dev server
        working-directory: frontend
        run: |
          npm run dev &
          sleep 5
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: Run Cypress E2E tests
        run: npx cypress run --browser chrome --headless
        env:
          CYPRESS_BASE_URL: http://localhost:5173
          CYPRESS_apiUrl: http://localhost:8080/api

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7
